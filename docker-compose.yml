services:
  db:
    image: postgres:16-alpine
    container_name: livraria_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-livraria}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-livraria123}
      POSTGRES_DB: ${POSTGRES_DB:-livraria_db}
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-livraria} -d ${POSTGRES_DB:-livraria_db}']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: livraria_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-livraria}:${POSTGRES_PASSWORD:-livraria123}@db:5432/${POSTGRES_DB:-livraria_db}?schema=public
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app:z
      - /app/node_modules
    command: sh -c "npx prisma migrate deploy && npx prisma generate && npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: livraria_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:3000
    ports:
      - '5173:5173'
    depends_on:
      - backend
    volumes:
      - ./frontend:/app:z
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data: